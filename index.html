<head>

    <style>
        /* --- DESIGN TOKENS & VARIABLES --- */
        :root {
            --bg-main: #0a0a0c;
            --accent-blue: #3a86ff;
            --glass-bg: rgba(25, 25, 28, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f2;
            --text-dim: #a0a0ab;
            --window-radius: 16px;
            --card-radius: 12px;
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.4);
            --transition-smooth: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* --- LAYOUT COMPONENTS --- */
        
        /* 1. Boot Screen */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .boot-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-blue), #8338ec);
            border-radius: 14px;
            margin-bottom: 24px;
            position: relative;
        }

        .boot-loader {
            width: 140px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .boot-loader-fill {
            width: 0%;
            height: 100%;
            background: var(--text-main);
            animation: bootProgress 2.5s forwards ease-in-out;
        }

        @keyframes bootProgress { 100% { width: 100%; } }

        /* 2. Desktop */
        #desktop {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1c1c21 0%, #0a0a0c 100%);
            display: none; /* Shown after boot */
        }

        canvas#starfield {
            position: absolute;
            inset: 0;
            z-index: 0;
            opacity: 0.4;
        }

        /* 3. Taskbar (Modern Floating Dock) */
        #taskbar {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            height: 58px;
            padding: 0 12px;
            background: rgba(20, 20, 23, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }

        .dock-item {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            font-size: 1.4rem;
        }

        .dock-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-4px);
        }

        .dock-item.active::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: var(--accent-blue);
            border-radius: 50%;
        }

        .dock-separator {
            width: 1px;
            height: 24px;
            background: var(--glass-border);
            margin: 0 4px;
        }

        .clock-widget {
            padding: 0 12px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* 4. Windows System */
        .window {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: var(--window-radius);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: winFocus 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-width: 400px;
        }

        @keyframes winFocus { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .window-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            cursor: default;
        }

        .window-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.3px;
        }

        .window-controls {
            display: flex;
            gap: 12px;
        }

        .win-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .win-btn:hover { opacity: 0.8; }
        .win-close { background: #ff5f57; }
        .win-min { background: #febc2e; }

        .window-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            max-height: 75vh;
        }

        /* 5. Game Library Components */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
        }

        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            border-radius: var(--card-radius);
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .game-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--glass-border);
            transform: translateY(-2px);
        }

        .game-card .icon {
            font-size: 2.2rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .game-card .name {
            font-size: 0.75rem;
            font-weight: 500;
            text-align: center;
            color: var(--text-dim);
            line-height: 1.2;
        }

        /* 6. Game Modal Player */
        #modal-player {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .modal-bar {
            height: 44px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #222;
        }

        .modal-bar .title { font-size: 0.8rem; font-weight: 600; color: var(--text-dim); }
        .modal-bar .close-btn { color: #ff5f57; cursor: pointer; font-size: 0.9rem; font-weight: bold; }

        #game-frame { flex: 1; border: none; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    </style>
</head>

            { title: "Acid Bunny", url: "https://script.google.com/macros/s/AKfycbzQinbUFpM6_ZM3lSnGIvfg3iRSHGUFPWlOpWyYKQUBnyZG5CNiqOKTQk2KT7FlUcVQ/exec", icon: "🐰" },
            { title: "Acid Bunny 2", url: "https://script.google.com/macros/s/AKfycbwboektrWd8rlGoyqQylkwAPbrx0gGg3QvJ-bYg3Kc9IiQK-_H89RN-L6OTZK_qL2_Vrg/exec", icon: "🐰" },
            { title: "Acid Rain", url: "https://script.google.com/macros/s/AKfycbwaVYAatmuoFi6_bwXdFxMg5a_XCAkmSJUXIlttbMEkt2M0_FuFn2s_AuEB4N4G4bTZ/exec", icon: "🧪" },
            { title: "Action Turnip", url: "https://script.google.com/macros/s/AKfycbz2GrrcDq7T6-ypg7ObskaWqHsNbeXLhF9fj3r5RLxYYZiB0AVVPgc4Z0AakD_kSzMK/exec", icon: "🧅" },
            { title: "Retro Bowl", url: "https://g.w3technic.com/games/retro-bowl/", icon: "🏈" },
            { title: "Stickman Hook", url: "https://monkeymart6x.io/stickman-hook.embed", icon: "🪝" },
            { title: "Slope", url: "https://slope-unblocked-10x.github.io/action-games/slope/", icon: "⛷️" }
        ];

        // --- WINDOW MANAGER ---
        const WindowManager = {
            zCount: 100,
            instances: new Set(),

            openLibrary() {
                if(this.instances.has('library')) {
                    this.focus('win-library');
                    return;
                }

                let html = `<div class="library-grid">`;
                GAME_DATA.forEach(g => {
                    html += `
                        <div class="game-card" onclick="GamePlayer.launch('${g.title}', '${g.url}')">
                            <div class="icon">${g.icon}</div>
                            <div class="name">${g.title}</div>
                        </div>
                    `;
                });
                html += `</div>`;

                this.create('library', 'Game Library', html, { width: '800px', height: '600px' });
            },

            openAbout() {
                if(this.instances.has('about')) return;
                const html = `
                    <div style="text-align:center; padding: 20px;">
                        <h2 style="margin-bottom:10px;">Stars OS</h2>
                        <p style="color:var(--text-dim); font-size:0.9rem;">Version 2.0.4 Premium</p>
                        <div style="margin:20px 0; font-size:3rem;">🌟</div>
                        <p style="font-size:0.85rem; line-height:1.6;">A high-performance gaming environment built for speed and privacy.</p>
                    </div>
                `;
                this.create('about', 'System Information', html, { width: '400px', height: '300px' });
            },

            create(id, title, content, style) {
                this.instances.add(id);
                const winId = `win-${id}`;
                const win = document.createElement('div');
                win.className = 'window';
                win.id = winId;
                win.style.width = style.width;
                win.style.height = style.height;
                win.style.left = '15%';
                win.style.top = '10%';
                win.style.zIndex = ++this.zCount;

                win.innerHTML = `
                    <div class="window-header" onmousedown="WindowManager.focus('${winId}')">
                        <div class="window-title">${title.toUpperCase()}</div>
                        <div class="window-controls">
                            <div class="win-btn win-min" onclick="WindowManager.close('${id}')"></div>
                            <div class="win-btn win-close" onclick="WindowManager.close('${id}')"></div>
                        </div>
                    </div>
                    <div class="window-content">${content}</div>
                `;

                document.getElementById('window-layer').appendChild(win);
                this.makeDraggable(win);
            },

            focus(winId) {
                const el = document.getElementById(winId);
                if(el) el.style.zIndex = ++this.zCount;
            },

            close(id) {
                const el = document.getElementById(`win-${id}`);
                if(el) {
                    el.style.opacity = '0';
                    el.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        el.remove();
                        this.instances.delete(id);
                    }, 200);
                }
            },

            makeDraggable(el) {
                let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                const header = el.querySelector('.window-header');
                header.onmousedown = (e) => {
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                    document.onmouseup = () => {
                        document.onmouseup = null;
                        document.onmousemove = null;
                    };
                    document.onmousemove = (e) => {
                        pos1 = pos3 - e.clientX;
                        pos2 = pos4 - e.clientY;
                        pos3 = e.clientX;
                        pos4 = e.clientY;
                        el.style.top = (el.offsetTop - pos2) + "px";
                        el.style.left = (el.offsetLeft - pos1) + "px";
                    };
                };
            }
        };

        // --- GAME PLAYER ---
        const GamePlayer = {
            launch(title, url) {
                const modal = document.getElementById('modal-player');
                const frame = document.getElementById('game-frame');
                document.getElementById('modal-title').innerText = title.toUpperCase();
                frame.src = url;
                modal.style.display = 'flex';
            },
            close() {
                const modal = document.getElementById('modal-player');
                const frame = document.getElementById('game-frame');
                frame.src = '';
                modal.style.display = 'none';
            }
        };

        // --- SYSTEM INITIALIZATION ---
        window.addEventListener('load', () => {
            // Clock
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock-display').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }, 1000);

            // Boot Sequence
            setTimeout(() => {
                document.getElementById('boot-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('desktop').style.display = 'block';
                    initStarfield();
                    WindowManager.openLibrary();
                }, 800);
            }, 2600);
        });

        // ESC Key handling
        window.addEventListener('keydown', e => {
            if(e.key === 'Escape') GamePlayer.close();
        });

        // Minimal Starfield (Subtle)
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];
            
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.onresize = resize;
            resize();

            for(let i=0; i<120; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    s: Math.random() * 1.5,
                    v: Math.random() * 0.2
                });
            }

            const anim = () => {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                stars.forEach(st => {
                    ctx.beginPath();
                    ctx.arc(st.x, st.y, st.s, 0, 7);
                    ctx.fill();
                    st.y += st.v;
                    if(st.y > canvas.height) st.y = 0;
                });
                requestAnimationFrame(anim);
            };
            anim();
        }

    </script>
</body>
