<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Cloaker Metadata -->
    <title>My Drive - Google Drive</title>
    <meta name="description" content="Access your files anywhere.">
    <meta name="keywords" content="drive, google, storage, files">
    
    <style>
        :root {
            --neon-purple: #d4a5ff;
            --bg-dark: #0a0518;
            --glass: rgba(20, 10, 35, 0.7);
            --glass-border: rgba(212, 165, 255, 0.2);
            --glow: 0 0 15px rgba(212, 165, 255, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            color: white;
        }

        /* --- BOOT SCREEN --- */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        .boot-logo {
            width: 100px;
            height: 100px;
            border: 4px solid var(--neon-purple);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: var(--glow);
        }

        .boot-text {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 5px;
            color: var(--neon-purple);
            text-shadow: var(--glow);
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--neon-purple);
            box-shadow: var(--glow);
            animation: progress 3s forwards;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes progress { 100% { width: 100%; } }

        /* --- DESKTOP --- */
        #desktop {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1a0b2e 0%, #0a0518 100%);
            display: none;
        }

        canvas#starfield {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* --- WINDOW SYSTEM --- */
        .window {
            position: absolute;
            min-width: 300px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: windowOpen 0.3s ease;
            z-index: 10;
        }

        @keyframes windowOpen {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .window-header {
            padding: 12px 18px;
            background: rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid var(--glass-border);
        }

        .window-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
        }

        .btn-close { background: #ff5f56; }
        .btn-close:hover { background: #ff3b30; }

        .window-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-height: 70vh;
        }

        /* --- GAME LIBRARY GRID --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .game-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .game-card:hover {
            background: rgba(212, 165, 255, 0.1);
            transform: translateY(-5px);
            box-shadow: var(--glow);
            border-color: var(--neon-purple);
        }

        .game-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .game-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: #eee;
        }

        /* --- TASKBAR --- */
        #taskbar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: rgba(10, 5, 24, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .start-btn {
            background: var(--neon-purple);
            color: var(--bg-dark);
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 20px;
            transition: var(--transition);
        }

        .start-btn:hover {
            box-shadow: var(--glow);
            filter: brightness(1.1);
        }

        .taskbar-items {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        .taskbar-clock {
            font-size: 0.9rem;
            color: var(--neon-purple);
            font-weight: 600;
        }

        /* --- MODAL PLAYER --- */
        #game-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        #game-modal iframe {
            flex: 1;
            border: none;
            background: #000;
        }

        .modal-header {
            height: 40px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #333;
        }

        .close-modal {
            color: #ff5f56;
            cursor: pointer;
            font-weight: bold;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-purple); }
    </style>
</head>

            { title: "Action Turnip", url: "https://script.google.com/macros/s/AKfycbz2GrrcDq7T6-ypg7ObskaWqHsNbeXLhF9fj3r5RLxYYZiB0AVVPgc4Z0AakD_kSzMK/exec", icon: "🧅" },
            { title: "Retro Bowl", url: "https://g.w3technic.com/games/retro-bowl/", icon: "🏈" },
            { title: "Stickman Hook", url: "https://monkeymart6x.io/stickman-hook.embed", icon: "🪝" },
            { title: "Slope", url: "https://slope-unblocked-10x.github.io/action-games/slope/", icon: "⛷️" }
        ];

        // --- CORE LOGIC ---
        window.addEventListener('load', () => {
            // Boot sequence
            setTimeout(() => {
                document.getElementById('boot-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('desktop').style.display = 'block';
                    initStarfield();
                    updateClock();
                    openLibrary(); // Open library by default
                }, 1000);
            }, 3000);
        });

        // --- STARFIELD BACKGROUND ---
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            window.addEventListener('resize', resize);
            resize();

            for(let i=0; i<200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1
                });
            }

            function animate() {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = '#d4a5ff';
                stars.forEach(s => {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                    ctx.fill();
                    s.y += s.speed;
                    if(s.y > canvas.height) s.y = 0;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // --- WINDOW MANAGER ---
        let zIndexCounter = 100;

        function createWindow(title, contentHTML) {
            const id = 'win-' + Math.random().toString(36).substr(2, 9);
            const win = document.createElement('div');
            win.className = 'window';
            win.id = id;
            win.style.top = '100px';
            win.style.left = '100px';
            win.style.zIndex = ++zIndexCounter;

            win.innerHTML = `
                <div class="window-header" onmousedown="focusWindow('${id}')">
                    <span class="window-title">${title}</span>
                    <div class="window-controls">
                        <div class="control-btn btn-close" onclick="closeWindow('${id}')"></div>
                    </div>
                </div>
                <div class="window-content">
                    ${contentHTML}
                </div>
            `;

            document.getElementById('window-layer').appendChild(win);
            makeDraggable(win);
            return id;
        }

        function focusWindow(id) {
            document.getElementById(id).style.zIndex = ++zIndexCounter;
        }

        function closeWindow(id) {
            const win = document.getElementById(id);
            win.style.transform = 'scale(0.9)';
            win.style.opacity = '0';
            setTimeout(() => win.remove(), 200);
        }

        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const header = el.querySelector('.window-header');
            
            header.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                focusWindow(el.id);
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        // --- GAME PLAYER LOGIC ---
        function openGame(title, url) {
            const modal = document.getElementById('game-modal');
            const frame = document.getElementById('game-frame');
            const titleEl = document.getElementById('modal-game-title');
            
            titleEl.innerText = title.toUpperCase();
            frame.src = url;
            modal.style.display = 'flex';
        }

        function closeGame() {
            const modal = document.getElementById('game-modal');
            const frame = document.getElementById('game-frame');
            frame.src = '';
            modal.style.display = 'none';
        }

        window.addEventListener('keydown', (e) => {
            if(e.key === 'Escape') closeGame();
        });

        // --- LIBRARY RENDERER ---
        function openLibrary() {
            // Check if already open
            if(document.querySelector('.game-grid')) return;

            let gridHTML = `<div class="game-grid">`;
            games.forEach(game => {
                gridHTML += `
                    <div class="game-card" onclick="openGame('${game.title}', '${game.url}')">
                        <span class="game-icon">${game.icon}</span>
                        <span class="game-title">${game.title}</span>
                    </div>
                `;
            });
            gridHTML += `</div>`;

            createWindow('Game Library', gridHTML);
        }

        // --- UTILS ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            setTimeout(updateClock, 1000);
        }

    </script>
</body>
</html>
